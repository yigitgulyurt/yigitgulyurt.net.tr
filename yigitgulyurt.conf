# /etc/nginx/sites-available/yigitgulyurt.net.tr
# ─────────────────────────────────────────────
# Kurulum sonrası obsidian SSL için:
#   sudo certbot --nginx -d obsidian.yigitgulyurt.net.tr
# Kurulum sonrası fonts SSL için:
#   sudo certbot --nginx -d fonts.yigitgulyurt.net.tr
# ─────────────────────────────────────────────

# ══════════════════════════════════════════════
# ANA SITE — yigitgulyurt.net.tr + www + canli
# ══════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yigitgulyurt.net.tr www.yigitgulyurt.net.tr canli.yigitgulyurt.net.tr;

    ssl_certificate     /etc/letsencrypt/live/yigitgulyurt.net.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yigitgulyurt.net.tr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location /canli-kaynak/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;

        # m3u8 playlist — kısa cache (sürekli güncelleniyor)
        location ~* \.m3u8$ {
            proxy_pass http://127.0.0.1:8888;
            proxy_cache hls_cache;
            proxy_cache_valid 200 1s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # .m4s ve .mp4 segmentler — uzun cache (değişmez)
        location ~* \.(m4s|mp4|ts)$ {
            proxy_pass http://127.0.0.1:8888;
            proxy_cache hls_cache;
            proxy_cache_valid 200 10s;
            proxy_cache_lock on;
            proxy_cache_use_stale updating;
            add_header Access-Control-Allow-Origin *;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }

    location /static/ {
        alias /var/www/yigitgulyurt/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/yigitgulyurt/yigitgulyurt.sock;
    }
}

# HTTP → HTTPS yönlendirme (ana site)
server {
    listen 80;
    listen [::]:80;
    server_name yigitgulyurt.net.tr www.yigitgulyurt.net.tr canli.yigitgulyurt.net.tr;

    if ($host = canli.yigitgulyurt.net.tr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.yigitgulyurt.net.tr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = yigitgulyurt.net.tr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    return 301 https://$host$request_uri;
}

# ══════════════════════════════════════════════
# CANLI (Türkçe IDN) — xn--canl-oza.yigitgulyurt.net.tr
# ══════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name xn--canl-oza.yigitgulyurt.net.tr;

    ssl_certificate     /etc/letsencrypt/live/yigitgulyurt.net.tr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/yigitgulyurt.net.tr/privkey.pem;   # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://canli.yigitgulyurt.net.tr$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name xn--canl-oza.yigitgulyurt.net.tr;

    if ($host = xn--canl-oza.yigitgulyurt.net.tr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    return 404; # managed by Certbot
}

# ══════════════════════════════════════════════
# OBSIDİAN — obsidian.yigitgulyurt.net.tr
# ══════════════════════════════════════════════
server {
    server_name obsidian.yigitgulyurt.net.tr;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/obsidian.yigitgulyurt.net.tr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/obsidian.yigitgulyurt.net.tr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # Static dosyalar
    location /static/ {
        alias /var/www/yigitgulyurt/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Flask uygulamasına ilet
    location / {
        include proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # KRİTİK: Google OAuth ve ProxyFix için
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_pass http://unix:/var/www/yigitgulyurt/yigitgulyurt.sock;
    }
}

server {
    if ($host = obsidian.yigitgulyurt.net.tr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name obsidian.yigitgulyurt.net.tr;
    return 404; # managed by Certbot
}

# ══════════════════════════════════════════════
# FONTS — fonts.yigitgulyurt.net.tr
# ══════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name fonts.yigitgulyurt.net.tr;

    ssl_certificate     /etc/letsencrypt/live/yigitgulyurt.net.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yigitgulyurt.net.tr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        alias /var/www/yigitgulyurt/app/static/fonts/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept" always;
        add_header Vary "Accept-Encoding";
        add_header X-Content-Type-Options "nosniff" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept" always;
            return 204;
        }

        access_log off;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name fonts.yigitgulyurt.net.tr;
    return 301 https://$host$request_uri;
}
