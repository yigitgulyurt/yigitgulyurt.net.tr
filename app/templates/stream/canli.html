<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canlı Yayın — yigitgulyurt.net.tr</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mono: 'Courier New', Courier, monospace;
      --accent: #4ade80;
      --accent2: #60a5fa;
      --red: #f87171;
      --bg: #0d0d0d;
      --bg2: #141414;
      --bg3: #1a1a1a;
      --text: #e2e2e2;
      --text2: #888;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--mono);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      border-bottom: 0.5px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .nav-logo {
      font-size: 14px; font-weight: 500;
      letter-spacing: -0.3px;
      text-decoration: none; color: var(--text);
    }
    .nav-logo .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      margin-left: 2px; vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .nav-back {
      font-size: 12px; color: var(--text2);
      text-decoration: none; transition: color .15s;
    }
    .nav-back:hover { color: var(--text); }

    /* ── WRAP ── */
    .canli-wrap {
      min-height: calc(100vh - 45px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
    }

    /* ── HEADER ── */
    .hero-banner {
      width: 100%; max-width: 900px;
      padding: 36px 24px 24px;
      text-align: center;
    }
    .hero-prompt {
      font-size: 11px; color: var(--accent);
      letter-spacing: 0.5px; margin-bottom: 12px;
    }
    .hero-title {
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 500; color: var(--text);
      letter-spacing: -0.5px; line-height: 1.2;
      margin-bottom: 6px;
    }
    .hero-title em { color: var(--accent2); font-style: normal; }
    .hero-subtitle {
      font-size: 13px; color: var(--text2);
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .hero-subtitle::before { content: '//'; color: var(--accent2); font-size: 12px; }

    /* ── LIVE BADGE ── */
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; letter-spacing: 2px;
      color: var(--red); margin-top: 14px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
      animation: livePulse 1.4s infinite;
      box-shadow: 0 0 6px var(--red);
    }
    @keyframes livePulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:.4; transform:scale(.8); }
    }

    /* ── PLAYER ── */
    .player-outer {
      width: 100%; max-width: 900px;
      padding: 0 20px;
    }
    .player-frame {
      border: 0.5px solid var(--border2);
      border-radius: 6px; overflow: hidden;
      position: relative;
    }
    /* köşe süslemeleri */
    .player-frame::before, .player-frame::after {
      content: ''; position: absolute;
      width: 16px; height: 16px;
      z-index: 10; pointer-events: none;
    }
    .player-frame::before {
      top: -0.5px; left: -0.5px;
      border-top: 1.5px solid var(--accent);
      border-left: 1.5px solid var(--accent);
    }
    .player-frame::after {
      bottom: -0.5px; right: -0.5px;
      border-bottom: 1.5px solid var(--accent);
      border-right: 1.5px solid var(--accent);
    }
    .player-container {
      width: 100%; background: #000;
      position: relative; aspect-ratio: 16/9;
    }
    #canli-video {
      width: 100%; height: 100%;
      object-fit: fill; background: #000;
      display: none; transform-origin: center center;
    }

    /* ── EKRANLAR ── */
    .fade-in-delayed { opacity: 0; animation: fadeIn .5s ease-in 1s forwards; }
    @keyframes fadeIn { to { opacity: 1; } }

    .waiting-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); gap: 16px; padding: 32px;
    }
    .waiting-icon {
      font-size: 2rem;
      filter: drop-shadow(0 0 8px rgba(74,222,128,0.3));
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
    .waiting-screen h3 {
      font-family: var(--mono); font-size: 12px;
      font-weight: 500; color: var(--text);
      letter-spacing: 2px; text-transform: uppercase; margin: 0;
    }
    .waiting-screen p {
      font-family: var(--mono); font-size: 12px;
      color: var(--text2); text-align: center;
      margin: 0; max-width: 260px; line-height: 1.6;
    }
    .waiting-dots { display: flex; gap: 6px; }
    .waiting-dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent); opacity: 0.2;
      animation: dotBounce 1.6s infinite;
    }
    .waiting-dots span:nth-child(2) { animation-delay: .25s; }
    .waiting-dots span:nth-child(3) { animation-delay: .5s; }
    @keyframes dotBounce {
      0%,80%,100% { opacity:.2; transform:scale(.8); }
      40% { opacity:.9; transform:scale(1.1); }
    }

    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 5; gap: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 1.5px solid rgba(74,222,128,0.15);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 10px; letter-spacing: 3px;
      color: rgba(74,222,128,0.5); text-transform: uppercase;
    }

    .error-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 5;
    }
    .error-overlay .err-icon { font-size: 1.8rem; opacity: 0.5; }
    .error-overlay p {
      font-size: 12px; color: var(--text2);
      text-align: center; margin: 0;
    }
    .retry-btn {
      font-family: var(--mono); font-size: 11px;
      background: transparent; color: var(--accent);
      border: 0.5px solid var(--accent);
      padding: 7px 18px; border-radius: 3px;
      letter-spacing: 1px; cursor: pointer;
      transition: all .15s; margin-top: 4px;
    }
    .retry-btn:hover { background: rgba(74,222,128,0.08); }

    /* ── CUSTOM CONTROLS ── */
    .custom-controls {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 0 12px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
      opacity: 0; transition: opacity .3s ease;
      display: flex; flex-direction: column; gap: 6px;
    }
    .player-container:hover .custom-controls,
    .player-container.controls-visible .custom-controls { opacity: 1; }
    .controls-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    .ctrl-left, .ctrl-right { display: flex; align-items: center; gap: 4px; }
    .ctrl-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 6px; border-radius: 3px; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.08); }
    .ctrl-btn svg { width: 17px; height: 17px; fill: currentColor; display: block; }

    .volume-wrap { display: flex; align-items: center; gap: 5px; }
    .volume-slider {
      -webkit-appearance: none; appearance: none;
      width: 66px; height: 2px; border-radius: 2px;
      background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
      background-image: linear-gradient(var(--accent), var(--accent));
      background-size: 100% 100%; background-repeat: no-repeat;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 4px rgba(74,222,128,0.4); cursor: pointer;
    }
    .volume-slider::-moz-range-thumb {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
    }

    .ctrl-live {
      font-size: 10px; letter-spacing: 2px; color: var(--red);
      display: flex; align-items: center; gap: 4px;
      margin-left: 4px; text-transform: uppercase;
    }
    .ctrl-live-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--red); animation: livePulse 1.4s infinite;
      box-shadow: 0 0 4px var(--red);
    }

    /* ── INFO BAR ── */
    .info-bar {
      width: 100%; max-width: 900px;
      padding: 0 20px; margin-top: 14px;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .status-text {
      font-size: 11px; color: var(--text2); letter-spacing: 0.3px;
    }
    .status-text::before { content: '// '; color: var(--accent2); }

    /* ── QUOTE ── */
    .quote-section {
      width: 100%; max-width: 560px;
      padding: 32px 24px 0; text-align: center;
    }
    .quote-text {
      font-size: 13px; font-style: italic;
      color: rgba(226,226,226,0.2); line-height: 1.8;
    }
    .quote-author {
      font-size: 10px; letter-spacing: 3px;
      color: rgba(96,165,250,0.25);
      text-transform: uppercase; margin-top: 10px;
    }

    .hidden { display: none !important; }

    /* ── RESPONSIVE ── */
    @media (min-width: 1400px) {
      .player-outer, .hero-banner, .info-bar { max-width: min(85vw, 1600px); }
      .quote-section { max-width: min(55vw, 800px); }
      .hero-title { font-size: clamp(2.2rem, 3vw, 3.2rem); }
    }
    @media (min-width: 2560px) {
      .player-outer, .hero-banner, .info-bar { max-width: 85vw; }
      .hero-title { font-size: clamp(3rem, 3.5vw, 5rem); }
    }
    @media (max-width: 600px) {
      .nav { padding: 10px 16px; }
      .hero-banner { padding: 24px 16px 18px; }
      .player-outer { padding: 0 12px; }
      .info-bar { padding: 0 12px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="https://yigitgulyurt.net.tr">
    yigitgulyurt<span class="cursor"></span>
  </a>
  <a class="nav-back" href="https://yigitgulyurt.net.tr">← ana sayfa</a>
</nav>

<div class="canli-wrap">

  <div class="hero-banner">
    <div class="hero-prompt">$ ffmpeg -re -i input | rtmp://...</div>
    <h1 class="hero-title"><em>Canlı</em> Yayın</h1>
    <div class="hero-subtitle">yigitgulyurt.net.tr</div>
    <div class="live-badge" id="liveBadge" style="display:none">
      <div class="live-dot"></div>CANLI
    </div>
  </div>

  <div class="player-outer">
    <div class="player-frame">
      <div class="player-container" id="playerContainer">

        <!-- Bekleme -->
        <div class="waiting-screen fade-in-delayed" id="waitingScreen">
          <div class="waiting-icon">📡</div>
          <h3>Yayın Bekleniyor</h3>
          <p>Yayın başladığında otomatik olarak açılacak</p>
          <div class="waiting-dots"><span></span><span></span><span></span></div>
        </div>

        <!-- Yükleniyor -->
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-text">Bağlanıyor</div>
        </div>

        <!-- Hata -->
        <div class="error-overlay hidden" id="errorOverlay">
          <div class="err-icon">⚠</div>
          <p id="errorMsg">Bağlantı kesildi</p>
          <button class="retry-btn" onclick="retryStream()">→ yeniden bağlan</button>
        </div>

        <!-- Video -->
        <video id="canli-video" playsinline></video>

        <!-- Kontroller -->
        <div class="custom-controls" id="customControls">
          <div class="controls-row">
            <div class="ctrl-left">
              <button class="ctrl-btn" id="btnPlayPause" title="Oynat / Duraklat" onclick="togglePlay()">
                <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
              </button>
              <div class="volume-wrap">
                <button class="ctrl-btn" id="btnMute" title="Sesi Kapat / Aç" onclick="toggleMute()">
                  <svg id="iconVolume" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                  <svg id="iconMuted" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider"
                       min="0" max="1" step="0.02" value="1"
                       oninput="changeVolume(this.value)" />
              </div>
              <span class="ctrl-live" id="ctrlLiveBadge" style="display:none">
                <span class="ctrl-live-dot"></span>canli
              </span>
            </div>
            <div class="ctrl-right">
              <button class="ctrl-btn" id="btnFullscreen" title="Tam Ekran" onclick="toggleFullscreen()">
                <svg id="iconFs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                <svg id="iconFsExit" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="info-bar">
    <div class="status-text" id="statusText">yayın bekleniyor</div>
    <div class="status-text" id="viewerCount" style="display:none">
      <span id="viewerNum">0</span> izleyici
    </div>
  </div>

  <div class="quote-section">
    <div class="quote-text">"Çanakkale geçilmez."</div>
    <div class="quote-author">Türk Milletinin Destanı</div>
  </div>

</div>

<script src="/static/js/hls.js"></script>
<script>
  var STREAM_URL  = '{{ stream_url }}';
  var STATUS_URL  = '/status';
  var PING_URL    = '/ping';
  var VIEWERS_URL = '/viewers';
  var hls = null, poller = null, viewerPoller = null;
  var retryCount = 0, MAX_RETRY = 3, playerActive = false;
  var SESSION_ID = Math.random().toString(36).slice(2) + Date.now().toString(36);
  var pinger = null;

  function startPinger() {
    if (pinger) return;
    sendPing();
    pinger = setInterval(sendPing, 30000);
  }
  function sendPing() {
    fetch(PING_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sid: SESSION_ID})
    }).catch(function(){});
  }
  function setStatus(msg) { document.getElementById('statusText').textContent = msg; }
  function showLiveBadge(show) {
    document.getElementById('liveBadge').style.display = show ? 'inline-flex' : 'none';
    document.getElementById('ctrlLiveBadge').style.display = show ? 'flex' : 'none';
  }
  function showOverlay(name) {
    ['loadingOverlay','errorOverlay'].forEach(function(id) {
      document.getElementById(id).classList.add('hidden');
    });
    if (name) document.getElementById(name).classList.remove('hidden');
  }
  function updateViewers(data) {
    var v = typeof data === 'object' ? (data.viewers || 0) : 0;
    var el = document.getElementById('viewerCount');
    if (v > 0) { document.getElementById('viewerNum').textContent = v; el.style.display = 'block'; }
    else { el.style.display = 'none'; }
  }
  function startViewerPoller() {
    if (viewerPoller) return;
    fetchViewers();
    viewerPoller = setInterval(fetchViewers, 15000);
  }
  function fetchViewers() {
    fetch(VIEWERS_URL).then(function(r){ return r.json(); })
      .then(updateViewers).catch(function(){});
  }
  function applyAspectRatio(video) {
    video.addEventListener('loadedmetadata', function() {
      var w = video.videoWidth, h = video.videoHeight;
      if (w && h) {
        if (h > w) {
          video.style.transform = 'rotate(90deg)';
          video.style.width = '177.78%'; video.style.height = '56.25%'; video.style.marginLeft = '-38.89%';
          document.getElementById('playerContainer').style.aspectRatio = h + ' / ' + w;
        } else {
          video.style.transform = 'none';
          video.style.width = '100%'; video.style.height = '100%'; video.style.marginLeft = '0';
          document.getElementById('playerContainer').style.aspectRatio = w + ' / ' + h;
        }
      }
    });
  }
  function startPlayer() {
    playerActive = true;
    startPinger(); startViewerPoller();
    var video = document.getElementById('canli-video');
    video.muted = true;
    document.getElementById('waitingScreen').style.display = 'none';
    video.style.display = 'block';
    showOverlay('loadingOverlay');
    showLiveBadge(true);
    setStatus('bağlanıyor...');
    if (hls) { hls.destroy(); hls = null; }
    applyAspectRatio(video);
    if (Hls.isSupported()) {
      hls = new Hls({ maxBufferLength: 15, maxMaxBufferLength: 30 });
      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        showOverlay(null); setStatus('yayın aktif'); retryCount = 0;
        video.muted = true;
        video.play().catch(function(e){ console.warn('play failed:', e); });
        updatePlayIcon(false);
        document.getElementById('iconVolume').style.display = 'none';
        document.getElementById('iconMuted').style.display = 'block';
        document.getElementById('volumeSlider').value = 0;
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) { handleStreamError(); return; }
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR &&
            data.details === Hls.ErrorDetails.FRAG_LOAD_ERROR &&
            data.response && data.response.code === 404) {
          fetch(STATUS_URL).then(function(r){ return r.json(); })
            .then(function(d){ if (!d.live) streamEnded(); }).catch(function(){});
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = STREAM_URL;
      video.addEventListener('canplay', function() {
        showOverlay(null); setStatus('yayın aktif');
        video.play(); updatePlayIcon(false);
      });
    }
  }
  function handleStreamError() {
    if (retryCount < MAX_RETRY) {
      retryCount++;
      setStatus('yeniden bağlanıyor... (' + retryCount + '/' + MAX_RETRY + ')');
      showOverlay('loadingOverlay');
      setTimeout(function() {
        fetch(STATUS_URL).then(function(r){ return r.json(); })
          .then(function(d) {
            if (d.live) { if (hls) hls.startLoad(); else startPlayer(); }
            else streamEnded();
          }).catch(function(){ streamEnded(); });
      }, 4000);
    } else streamEnded();
  }
  function streamEnded() {
    playerActive = false;
    if (viewerPoller) { clearInterval(viewerPoller); viewerPoller = null; }
    showLiveBadge(false);
    document.getElementById('errorMsg').textContent = 'yayın sona erdi';
    showOverlay('errorOverlay');
    setStatus('yayın sona erdi');
    startPolling();
  }
  function retryStream() {
    retryCount = 0;
    fetch(STATUS_URL).then(function(r){ return r.json(); })
      .then(function(d) {
        if (d.live) { startPlayer(); }
        else {
          showOverlay(null);
          document.getElementById('waitingScreen').style.display = 'flex';
          document.getElementById('canli-video').style.display = 'none';
          showLiveBadge(false); setStatus('yayın bekleniyor'); startPolling();
        }
      });
  }
  function startPolling() {
    if (playerActive) return;
    if (poller) clearInterval(poller);
    poller = setInterval(function() {
      if (playerActive) { clearInterval(poller); poller = null; return; }
      fetch(STATUS_URL).then(function(r){ return r.json(); })
        .then(function(d) {
          updateViewers(d);
          if (d.live) { clearInterval(poller); poller = null; startPlayer(); }
        }).catch(function(){});
    }, 5000);
  }
  function updatePlayIcon(isPaused) {
    document.getElementById('iconPlay').style.display  = isPaused ? 'block' : 'none';
    document.getElementById('iconPause').style.display = isPaused ? 'none'  : 'block';
  }
  function togglePlay() {
    var video = document.getElementById('canli-video');
    if (video.paused) { video.play(); updatePlayIcon(false); }
    else { video.pause(); updatePlayIcon(true); }
  }
  function toggleMute() {
    var video = document.getElementById('canli-video');
    video.muted = !video.muted;
    document.getElementById('iconVolume').style.display = video.muted ? 'none'  : 'block';
    document.getElementById('iconMuted').style.display  = video.muted ? 'block' : 'none';
    document.getElementById('volumeSlider').value = video.muted ? 0 : video.volume;
  }
  function changeVolume(val) {
    var video = document.getElementById('canli-video');
    video.volume = val; video.muted = (val == 0);
    document.getElementById('iconVolume').style.display = (val == 0) ? 'none'  : 'block';
    document.getElementById('iconMuted').style.display  = (val == 0) ? 'block' : 'none';
    document.getElementById('volumeSlider').style.backgroundSize = (val * 100) + '% 100%';
  }
  function toggleFullscreen() {
    var el = document.getElementById('playerContainer');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);
  function syncFsIcon() {
    var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    document.getElementById('iconFs').style.display     = inFs ? 'none'  : 'block';
    document.getElementById('iconFsExit').style.display = inFs ? 'block' : 'none';
  }
  (function() {
    var pc = document.getElementById('playerContainer');
    if (!pc) return;
    var hideTimer;
    pc.addEventListener('touchstart', function() {
      pc.classList.add('controls-visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function() { pc.classList.remove('controls-visible'); }, 3000);
    });
    pc.addEventListener('dblclick', toggleFullscreen);
  })();

  fetch(STATUS_URL).then(function(r){ return r.json(); })
    .then(function(d){ updateViewers(d); if (d.live) startPlayer(); else startPolling(); })
    .catch(function(){ startPolling(); });
</script>
</body>
</html>
