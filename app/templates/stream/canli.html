<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canlı Yayın — yigitgulyurt.net.tr</title>
  <meta name="robots" content="noindex">
  <style>
    @font-face {
      font-family: 'Cinzel'; font-style: normal; font-weight: 400; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/cinzel-v26-latin-regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Cinzel'; font-style: normal; font-weight: 600; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/cinzel-v26-latin-600.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Cinzel'; font-style: normal; font-weight: 700; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/cinzel-v26-latin-700.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Cinzel'; font-style: normal; font-weight: 900; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/cinzel-v26-latin-900.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Crimson Pro'; font-style: normal; font-weight: 300; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/crimson-pro-v28-latin-300.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Crimson Pro'; font-style: normal; font-weight: 400; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/crimson-pro-v28-latin-regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Crimson Pro'; font-style: italic; font-weight: 300; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/crimson-pro-v28-latin-300italic.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Crimson Pro'; font-style: italic; font-weight: 400; font-display: swap;
      src: url('https://fonts.cagrivakti.com.tr/crimson-pro-v28-latin-italic.woff2') format('woff2');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --kirmizi: #c0392b;
      --kirmizi-koyu: #96281b;
      --kirmizi-acik: rgba(192,57,43,0.15);
      --altin: #d4a843;
      --altin-acik: rgba(212,168,67,0.12);
      --lacivert: #1a2744;
      --bej: #e8dcc8;
      --bej-soluk: rgba(232,220,200,0.06);
      --dark: #0c0c0c;
    }
    html, body { height: 100%; background: var(--dark); }
    .canli-wrap {
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
      position: relative;
      overflow: hidden;
    }
    .canli-wrap::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(192,57,43,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(26,39,68,0.3) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .canli-wrap::after {
      content: '';
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--kirmizi), var(--altin), var(--kirmizi), transparent);
      z-index: 10;
    }
    .hero-banner {
      width: 100%; padding: 40px 24px 32px;
      text-align: center; position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
    }
    .hero-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 4px; color: var(--altin); text-transform: uppercase;
      margin-bottom: 12px; opacity: 0.85;
    }
    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 900; color: var(--bej); line-height: 1.15;
      margin: 0 0 8px; text-shadow: 0 2px 20px rgba(0,0,0,0.5); letter-spacing: 1px;
    }
    .hero-title em { color: var(--kirmizi); font-style: normal; }
    .hero-subtitle {
      font-family: 'Crimson Pro', serif; font-size: 1rem;
      font-weight: 300; font-style: italic;
      color: rgba(232,220,200,0.5); letter-spacing: 1px;
    }
    .hero-divider {
      display: flex; align-items: center; justify-content: center;
      margin: 10px 0; gap: 10px;
    }
    .hero-divider::before, .hero-divider::after {
      content: ''; height: 1px; width: 400px;
      background: linear-gradient(90deg, transparent, var(--altin));
    }
    .hero-divider::after { background: linear-gradient(90deg, var(--altin), transparent); }
    .hero-divider-star { color: var(--altin); font-size: 0.7rem; opacity: 0.7; }
    .player-outer {
      width: 100%; max-width: 900px; padding: 0 16px;
      position: relative; z-index: 1;
    }
    .player-frame {
      position: relative;
      border: 1px solid rgba(212,168,67,0.15);
      border-radius: 4px; overflow: hidden;
      box-shadow: 0 0 0 1px rgba(192,57,43,0.08), 0 32px 80px rgba(0,0,0,0.7),
                  inset 0 1px 0 rgba(212,168,67,0.08);
    }
    .player-frame::before, .player-frame::after {
      content: ''; position: absolute;
      width: 20px; height: 20px; z-index: 10; pointer-events: none;
    }
    .player-frame::before {
      top: -1px; left: -1px;
      border-top: 2px solid var(--altin); border-left: 2px solid var(--altin);
    }
    .player-frame::after {
      bottom: -1px; right: -1px;
      border-bottom: 2px solid var(--altin); border-right: 2px solid var(--altin);
    }
    .player-container {
      width: 100%; background: #000;
      position: relative; aspect-ratio: 16 / 9;
    }
    #canli-video {
      width: 100%; height: 100%;
      object-fit: fill; background: #000; display: none;
      transform-origin: center center;
    }
    .fade-in-delayed { opacity: 0; animation: fadeInOpacity 0.5s ease-in 1s forwards; }
    @keyframes fadeInOpacity { to { opacity: 1; } }
    .waiting-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, #0c0c0c 0%, #111318 100%);
      gap: 20px; padding: 32px;
    }
    .waiting-emblem {
      position: relative; width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
    }
    .waiting-emblem-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1px solid rgba(212,168,67,0.2);
      animation: emblemRing 3s infinite ease-out;
    }
    .waiting-emblem-ring:nth-child(2) {
      inset: -12px; border-color: rgba(212,168,67,0.1); animation-delay: 0.8s;
    }
    @keyframes emblemRing {
      0% { transform: scale(0.9); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .waiting-emblem-icon {
      font-size: 2.2rem; position: relative; z-index: 1;
      filter: drop-shadow(0 0 12px rgba(212,168,67,0.3));
    }
    .waiting-screen h3 {
      font-family: 'Cinzel', serif; color: var(--bej);
      font-size: 1.1rem; font-weight: 700;
      margin: 0; letter-spacing: 2px; text-transform: uppercase;
    }
    .waiting-screen p {
      font-family: 'Crimson Pro', serif; color: rgba(232,220,200,0.45);
      font-size: 1rem; font-style: italic;
      text-align: center; margin: 0; max-width: 280px; line-height: 1.6;
    }
    .waiting-dots { display: flex; gap: 8px; }
    .waiting-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--altin); opacity: 0.25;
      animation: dotBounce 1.6s infinite;
    }
    .waiting-dots span:nth-child(2) { animation-delay: 0.25s; }
    .waiting-dots span:nth-child(3) { animation-delay: 0.5s; }
    @keyframes dotBounce {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40% { opacity: 0.9; transform: scale(1.1); }
    }
    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 5; backdrop-filter: blur(6px); gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(212,168,67,0.15);
      border-top-color: var(--altin);
      border-radius: 50%; animation: spinAnim 0.8s linear infinite;
    }
    .loading-text {
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 3px; color: rgba(212,168,67,0.6); text-transform: uppercase;
    }
    @keyframes spinAnim { to { transform: rotate(360deg); } }
    .error-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 5; backdrop-filter: blur(6px);
    }
    .error-overlay .err-icon { font-size: 2rem; opacity: 0.6; }
    .error-overlay p {
      font-family: 'Crimson Pro', serif; color: rgba(232,220,200,0.5);
      font-size: 1rem; font-style: italic; text-align: center; margin: 0;
    }
    .retry-btn {
      background: transparent; color: var(--altin);
      border: 1px solid rgba(212,168,67,0.3);
      padding: 9px 22px; border-radius: 2px;
      font-family: 'Cinzel', serif; font-weight: 600; font-size: 0.7rem;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .retry-btn:hover { background: var(--altin-acik); border-color: rgba(212,168,67,0.6); }
    .custom-controls {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 0 14px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      opacity: 0; transition: opacity 0.3s ease;
      display: flex; flex-direction: column; gap: 8px;
    }
    .player-container:hover .custom-controls,
    .player-container.controls-visible .custom-controls { opacity: 1; }
    .controls-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .ctrl-left, .ctrl-right { display: flex; align-items: center; gap: 6px; }
    .ctrl-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 6px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; color: var(--bej);
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.08); }
    .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }
    .volume-wrap { display: flex; align-items: center; gap: 6px; }
    .volume-slider {
      -webkit-appearance: none; appearance: none;
      width: 70px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.2); outline: none; cursor: pointer;
      background-image: linear-gradient(var(--altin), var(--altin));
      background-size: 100% 100%; background-repeat: no-repeat;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--altin);
      box-shadow: 0 0 4px rgba(212,168,67,0.5); cursor: pointer;
      transition: transform 0.15s;
    }
    .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
    .volume-slider::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--altin); border: none; cursor: pointer;
    }
    .ctrl-live {
      font-family: 'Cinzel', serif; font-size: 0.6rem; font-weight: 700;
      letter-spacing: 2px; color: #e87070;
      display: flex; align-items: center; gap: 5px;
      margin-left: 4px; opacity: 0.9;
    }
    .ctrl-live-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--kirmizi); animation: livePulse 1.4s infinite;
      box-shadow: 0 0 5px var(--kirmizi); flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px var(--kirmizi); }
      50% { opacity: 0.5; transform: scale(0.85); box-shadow: 0 0 2px var(--kirmizi); }
    }
    .info-bar {
      width: 100%; max-width: 900px; padding: 0 16px; margin-top: 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
    }
    .status-text {
      font-family: 'Crimson Pro', serif; font-size: 0.88rem;
      font-style: italic; color: rgba(232,220,200,0.35); letter-spacing: 0.5px;
    }
    .quote-section {
      width: 100%; max-width: 600px; padding: 32px 24px 0;
      text-align: center; position: relative; z-index: 1;
    }
    .quote-text {
      font-family: 'Crimson Pro', serif; font-size: 1.05rem;
      font-style: italic; font-weight: 300; color: rgba(232,220,200,0.3);
      line-height: 1.8; letter-spacing: 0.3px;
    }
    .quote-author {
      font-family: 'Cinzel', serif; font-size: 0.62rem;
      letter-spacing: 3px; color: rgba(212,168,67,0.3);
      text-transform: uppercase; margin-top: 12px;
    }
    .hidden { display: none !important; }
    @media (min-width: 1400px) {
      .player-outer, .hero-banner, .info-bar { max-width: min(85vw, 1600px); }
      .quote-section { max-width: min(60vw, 900px); }
      .hero-title { font-size: clamp(2.6rem, 3.5vw, 4.2rem); }
    }
    @media (min-width: 2560px) {
      .player-outer, .hero-banner, .info-bar { max-width: 85vw; }
      .hero-title { font-size: clamp(4rem, 4vw, 6rem); }
    }
  </style>
</head>
<body>
<div class="canli-wrap">
  <div class="hero-banner">
    <div class="hero-eyebrow">✦ Canlı Yayın ✦</div>
    <div class="hero-divider"><span class="hero-divider-star">✦</span></div>
    <h1 class="hero-title"><em>yigitgulyurt</em>.net.tr</h1>
    <div class="hero-subtitle">Canlı Yayın</div>
  </div>

  <div class="player-outer">
    <div class="player-frame">
      <div class="player-container" id="playerContainer">
        <div class="waiting-screen fade-in-delayed" id="waitingScreen">
          <div class="waiting-emblem">
            <div class="waiting-emblem-ring"></div>
            <div class="waiting-emblem-ring"></div>
            <div class="waiting-emblem-icon">📡</div>
          </div>
          <h3>Yayın Bekleniyor</h3>
          <p>Yayın başladığında otomatik olarak açılacak</p>
          <div class="waiting-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-text">Bağlanıyor</div>
        </div>
        <div class="error-overlay hidden" id="errorOverlay">
          <div class="err-icon">⚠️</div>
          <p id="errorMsg">Bağlantı kesildi</p>
          <button class="retry-btn" onclick="retryStream()">Yeniden Bağlan</button>
        </div>
        <video id="canli-video" playsinline></video>
        <div class="custom-controls" id="customControls">
          <div class="controls-row">
            <div class="ctrl-left">
              <button class="ctrl-btn" id="btnPlayPause" title="Oynat / Duraklat" onclick="togglePlay()">
                <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
              </button>
              <div class="volume-wrap">
                <button class="ctrl-btn" id="btnMute" title="Sesi Kapat / Aç" onclick="toggleMute()">
                  <svg id="iconVolume" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                  <svg id="iconMuted" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <input type="range" class="volume-slider" id="volumeSlider"
                       min="0" max="1" step="0.02" value="1"
                       oninput="changeVolume(this.value)" />
              </div>
              <span class="ctrl-live" id="ctrlLiveBadge" style="display:none;">
                <span class="ctrl-live-dot"></span>CANLI
              </span>
            </div>
            <div class="ctrl-right">
              <button class="ctrl-btn" id="btnFullscreen" title="Tam Ekran" onclick="toggleFullscreen()">
                <svg id="iconFs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                <svg id="iconFsExit" viewBox="0 0 24 24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="info-bar">
    <div class="status-text" id="statusText">Yayın bekleniyor...</div>
    <div class="status-text" id="viewerCount" style="display:none;">👁 <span id="viewerNum">0</span> izleyici</div>
  </div>

  <div class="quote-section">
    <div class="quote-text">"Çanakkale geçilmez."</div>
    <div class="quote-author">Türk Milletinin Destanı</div>
  </div>
</div>

<script src="/static/js/hls.js"></script>
<script>
  var STREAM_URL  = '{{ stream_url }}';
  var STATUS_URL  = '/stream/status';
  var PING_URL    = '/stream/ping';
  var VIEWERS_URL = '/stream/viewers';
  var hls = null, poller = null, viewerPoller = null;
  var retryCount = 0, MAX_RETRY = 3, playerActive = false;
  var SESSION_ID = Math.random().toString(36).slice(2) + Date.now().toString(36);
  var pinger = null;

  function startPinger() {
    if (pinger) return;
    sendPing();
    pinger = setInterval(sendPing, 30000);
  }
  function sendPing() {
    fetch(PING_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sid: SESSION_ID})
    }).catch(function(){});
  }
  function setStatus(msg) { document.getElementById('statusText').textContent = msg; }
  function showLiveBadge(show) {
    document.getElementById('ctrlLiveBadge').style.display = show ? 'flex' : 'none';
  }
  function showOverlay(name) {
    ['loadingOverlay','errorOverlay'].forEach(function(id) {
      document.getElementById(id).classList.add('hidden');
    });
    if (name) document.getElementById(name).classList.remove('hidden');
  }
  function updateViewers(data) {
    var v = typeof data === 'object' ? (data.viewers || 0) : 0;
    var el = document.getElementById('viewerCount');
    if (v > 0) { document.getElementById('viewerNum').textContent = v; el.style.display = 'block'; }
    else { el.style.display = 'none'; }
  }
  function startViewerPoller() {
    if (viewerPoller) return;
    fetchViewers();
    viewerPoller = setInterval(fetchViewers, 15000);
  }
  function fetchViewers() {
    fetch(VIEWERS_URL).then(function(r){ return r.json(); })
      .then(updateViewers).catch(function(){});
  }
  function applyAspectRatio(video) {
    video.addEventListener('loadedmetadata', function() {
      var w = video.videoWidth, h = video.videoHeight;
      if (w && h) {
        if (h > w) {
          video.style.transform = 'rotate(90deg)';
          video.style.width = '177.78%'; video.style.height = '56.25%'; video.style.marginLeft = '-38.89%';
          document.getElementById('playerContainer').style.aspectRatio = h + ' / ' + w;
        } else {
          video.style.transform = 'none';
          video.style.width = '100%'; video.style.height = '100%'; video.style.marginLeft = '0';
          document.getElementById('playerContainer').style.aspectRatio = w + ' / ' + h;
        }
      }
    });
  }
  function startPlayer() {
    playerActive = true;
    startPinger(); startViewerPoller();
    var video = document.getElementById('canli-video');
    video.muted = true;
    document.getElementById('waitingScreen').style.display = 'none';
    video.style.display = 'block';
    showOverlay('loadingOverlay');
    showLiveBadge(true);
    setStatus('Yayına bağlanıyor...');
    if (hls) { hls.destroy(); hls = null; }
    applyAspectRatio(video);
    if (Hls.isSupported()) {
      hls = new Hls({ maxBufferLength: 15, maxMaxBufferLength: 30 });
      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        showOverlay(null); setStatus('Canlı yayın aktif'); retryCount = 0;
        video.muted = true;
        video.play().catch(function(e){ console.warn('play failed:', e); });
        updatePlayIcon(false);
        document.getElementById('iconVolume').style.display = 'none';
        document.getElementById('iconMuted').style.display = 'block';
        document.getElementById('volumeSlider').value = 0;
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) { handleStreamError(); return; }
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR &&
            data.details === Hls.ErrorDetails.FRAG_LOAD_ERROR &&
            data.response && data.response.code === 404) {
          fetch(STATUS_URL).then(function(r){ return r.json(); })
            .then(function(d){ if (!d.live) streamEnded(); }).catch(function(){});
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = STREAM_URL;
      video.addEventListener('canplay', function() {
        showOverlay(null); setStatus('Canlı yayın aktif');
        video.play(); updatePlayIcon(false);
      });
    }
  }
  function handleStreamError() {
    if (retryCount < MAX_RETRY) {
      retryCount++;
      setStatus('Yeniden bağlanıyor... (' + retryCount + '/' + MAX_RETRY + ')');
      showOverlay('loadingOverlay');
      setTimeout(function() {
        fetch(STATUS_URL).then(function(r){ return r.json(); })
          .then(function(d) {
            if (d.live) { if (hls) hls.startLoad(); else startPlayer(); }
            else streamEnded();
          }).catch(function(){ streamEnded(); });
      }, 4000);
    } else streamEnded();
  }
  function streamEnded() {
    playerActive = false;
    if (viewerPoller) { clearInterval(viewerPoller); viewerPoller = null; }
    showLiveBadge(false);
    document.getElementById('errorMsg').textContent = 'Yayın sona erdi';
    showOverlay('errorOverlay');
    setStatus('Yayın sona erdi');
    startPolling();
  }
  function retryStream() {
    retryCount = 0;
    fetch(STATUS_URL).then(function(r){ return r.json(); })
      .then(function(d) {
        if (d.live) { startPlayer(); }
        else {
          showOverlay(null);
          document.getElementById('waitingScreen').style.display = 'flex';
          document.getElementById('canli-video').style.display = 'none';
          showLiveBadge(false); setStatus('Yayın bekleniyor...'); startPolling();
        }
      });
  }
  function startPolling() {
    if (playerActive) return;
    if (poller) clearInterval(poller);
    poller = setInterval(function() {
      if (playerActive) { clearInterval(poller); poller = null; return; }
      fetch(STATUS_URL).then(function(r){ return r.json(); })
        .then(function(d) {
          updateViewers(d);
          if (d.live) { clearInterval(poller); poller = null; startPlayer(); }
        }).catch(function(){});
    }, 5000);
  }
  function updatePlayIcon(isPaused) {
    document.getElementById('iconPlay').style.display  = isPaused ? 'block' : 'none';
    document.getElementById('iconPause').style.display = isPaused ? 'none'  : 'block';
  }
  function togglePlay() {
    var video = document.getElementById('canli-video');
    if (video.paused) { video.play(); updatePlayIcon(false); }
    else { video.pause(); updatePlayIcon(true); }
  }
  function toggleMute() {
    var video = document.getElementById('canli-video');
    video.muted = !video.muted;
    document.getElementById('iconVolume').style.display = video.muted ? 'none'  : 'block';
    document.getElementById('iconMuted').style.display  = video.muted ? 'block' : 'none';
    document.getElementById('volumeSlider').value = video.muted ? 0 : video.volume;
  }
  function changeVolume(val) {
    var video = document.getElementById('canli-video');
    video.volume = val; video.muted = (val == 0);
    document.getElementById('iconVolume').style.display = (val == 0) ? 'none'  : 'block';
    document.getElementById('iconMuted').style.display  = (val == 0) ? 'block' : 'none';
    document.getElementById('volumeSlider').style.backgroundSize = (val * 100) + '% 100%';
  }
  function toggleFullscreen() {
    var el = document.getElementById('playerContainer');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);
  function syncFsIcon() {
    var inFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    document.getElementById('iconFs').style.display     = inFs ? 'none'  : 'block';
    document.getElementById('iconFsExit').style.display = inFs ? 'block' : 'none';
  }
  (function() {
    var pc = document.getElementById('playerContainer');
    if (!pc) return;
    var hideTimer;
    pc.addEventListener('touchstart', function() {
      pc.classList.add('controls-visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function() { pc.classList.remove('controls-visible'); }, 3000);
    });
    pc.addEventListener('dblclick', toggleFullscreen);
  })();

  // Başlat
  fetch(STATUS_URL).then(function(r){ return r.json(); })
    .then(function(d){ updateViewers(d); if (d.live) startPlayer(); else startPolling(); })
    .catch(function(){ startPolling(); });
</script>
</body>
</html>
