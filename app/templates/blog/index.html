{% extends "base.html" %}
{% block title %}Blog{% endblock %}

{% block content %}
<div class="section-header">
  <div class="section-tag">blog</div>
</div>
<div class="posts" style="padding-top:4px;border-bottom:none;padding-left:32px;padding-right:32px">
  {% if posts %}
    {% for post in posts %}
    <div class="post-item">
      <a class="post-title" href="{{ url_for('blog.detail', slug=post.slug) }}">{{ post.title }}</a>
      <div class="post-meta">{{ post.created_at.strftime('%Y-%m-%d') }}</div>
    </div>
    {% endfor %}
  {% else %}
  <div class="post-item">
    <span class="post-title lang-tr" style="color:var(--text2)">Henüz yazı yok.</span>
    <span class="post-title lang-en" style="color:var(--text2)">No posts yet.</span>
  </div>
  {% endif %}
</div>
{% endblock %}
