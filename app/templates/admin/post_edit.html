{% extends "admin/base.html" %}
{% block title %}{{ 'Düzenle' if post.id else 'Yeni Yazı' }}{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Yazıyı Düzenle' if post.id else 'Yeni Yazı' }}</h1>

<form method="POST" style="margin-top:24px">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="form-group" style="margin-bottom:0">
      <label>// başlık *</label>
      <input type="text" name="title" id="title-input" value="{{ post.title or '' }}" required>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>// slug (boş bırakılırsa otomatik)</label>
      <input type="text" name="slug" value="{{ post.slug or '' }}">
    </div>
  </div>

  <div class="form-group">
    <label>// özet</label>
    <input type="text" name="summary" value="{{ post.summary or '' }}">
  </div>

  <!-- SPLIT EDITOR -->
  <div class="form-group">
    <div class="editor-toolbar">
      <span style="font-size:11px;color:var(--accent)">// içerik (Markdown)</span>
      <div style="display:flex;gap:8px">
        <button type="button" class="editor-btn" onclick="insertMd('**', '**')" title="Kalın">B</button>
        <button type="button" class="editor-btn" onclick="insertMd('*', '*')" title="İtalik"><em>I</em></button>
        <button type="button" class="editor-btn" onclick="insertMd('`', '`')" title="Kod">&#96;</button>
        <button type="button" class="editor-btn" onclick="insertMd('```\n', '\n```')" title="Kod bloğu">{ }</button>
        <button type="button" class="editor-btn" onclick="insertMd('## ', '')" title="Başlık">H2</button>
        <button type="button" class="editor-btn" onclick="insertMd('- ', '')" title="Liste">—</button>
        <button type="button" class="editor-btn" onclick="insertMd('[', '](url)')" title="Link">↗</button>
      </div>
    </div>
    <div class="editor-split">
      <textarea
        name="content"
        id="md-editor"
        class="editor-textarea"
        placeholder="Markdown yaz...">{{ post.content or '' }}</textarea>
      <div id="md-preview" class="editor-preview blog-content">
        <span style="color:var(--text2);font-size:12px">önizleme burada görünür...</span>
      </div>
    </div>
  </div>

  <div class="form-group" style="display:flex;align-items:center;gap:10px">
    <input type="checkbox" name="published" id="published" {{ 'checked' if post.published }} style="width:auto">
    <label for="published" style="color:var(--text2);margin-bottom:0">yayınla</label>
  </div>

  <div style="display:flex;gap:10px;margin-top:8px">
    <button type="submit" class="btn btn-primary">→ kaydet</button>
    <a class="btn" href="{{ url_for('admin.blog') }}">iptal</a>
  </div>

</form>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
  const editor  = document.getElementById('md-editor');
  const preview = document.getElementById('md-preview');

  function renderPreview() {
    const md = editor.value.trim();
    preview.innerHTML = md ? marked.parse(md) : '<span style="color:var(--text2);font-size:12px">önizleme burada görünür...</span>';
  }

  editor.addEventListener('input', renderPreview);
  renderPreview(); // sayfa açılınca mevcut içeriği render et

  // Toolbar yardımcısı
  function insertMd(before, after) {
    const start = editor.selectionStart;
    const end   = editor.selectionEnd;
    const sel   = editor.value.substring(start, end);
    const insert = before + (sel || 'metin') + after;
    editor.setRangeText(insert, start, end, 'select');
    editor.focus();
    renderPreview();
  }

  // Tab tuşu — 2 boşluk ekle, formu gönderme
  editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = this.selectionStart;
      this.setRangeText('  ', s, s, 'end');
      renderPreview();
    }
  });
</script>
{% endblock %}
