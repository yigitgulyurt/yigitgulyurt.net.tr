{% extends "admin/base.html" %}
{% block title %}{{ 'Düzenle' if post.id else 'Yeni Yazı' }}{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Yazıyı Düzenle' if post.id else 'Yeni Yazı' }}</h1>

<form method="POST" style="margin-top:24px">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="form-group" style="margin-bottom:0">
      <label>// başlık *</label>
      <input type="text" name="title" value="{{ post.title or '' }}" required>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>// slug (boş bırakılırsa otomatik)</label>
      <input type="text" name="slug" value="{{ post.slug or '' }}">
    </div>
  </div>

  <div class="form-group">
    <label>// özet</label>
    <input type="text" name="summary" value="{{ post.summary or '' }}">
  </div>

  <div class="form-group">
    <div class="editor-toolbar">
      <span style="font-size:11px;color:var(--accent)">// içerik (Markdown)</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button type="button" class="editor-btn" onclick="insertMd('**','**')" title="Kalın"><strong>B</strong></button>
        <button type="button" class="editor-btn" onclick="insertMd('*','*')" title="İtalik"><em>I</em></button>
        <button type="button" class="editor-btn" onclick="insertMd('\`','\`')" title="Kod">&#96;</button>
        <button type="button" class="editor-btn" onclick="insertBlock('\`\`\`\n','\n\`\`\`')" title="Kod bloğu">{ }</button>
        <button type="button" class="editor-btn" onclick="insertLine('## ')" title="Başlık">H2</button>
        <button type="button" class="editor-btn" onclick="insertLine('- ')" title="Liste">—</button>
        <button type="button" class="editor-btn" onclick="insertMd('[','](https://)')" title="Link">↗</button>
        <span style="width:0.5px;background:var(--border);align-self:stretch;margin:0 4px"></span>
        <button type="button" class="editor-btn" onclick="renderPreview()" title="Önizlemeyi güncelle" style="color:var(--accent);border-color:var(--accent)">⟳ önizle</button>
      </div>
    </div>
    <div class="editor-split">
      <textarea
        name="content"
        id="md-editor"
        class="editor-textarea"
        placeholder="Markdown yaz...">{{ post.content or '' }}</textarea>
      <div id="md-preview" class="editor-preview blog-content">
        <span style="color:var(--text2);font-size:12px">önizleme burada görünür...</span>
      </div>
    </div>
  </div>

  <div class="form-group" style="display:flex;align-items:center;gap:10px">
    <input type="checkbox" name="published" id="published" {{ 'checked' if post.published }} style="width:auto">
    <label for="published" style="color:var(--text2);margin-bottom:0">yayınla</label>
  </div>

  <div style="display:flex;gap:10px;margin-top:8px">
    <button type="submit" class="btn btn-primary">→ kaydet</button>
    <a class="btn" href="{{ url_for('admin.blog') }}">iptal</a>
  </div>

</form>
{% endblock %}

{% block scripts %}
<script>
const editor  = document.getElementById('md-editor');
const preview = document.getElementById('md-preview');
const PREVIEW_URL = '{{ url_for("admin.preview") }}';

// Ctrl+Z için undo stack
let undoStack = [editor.value];
let undoIndex = 0;

function saveUndo() {
  // mevcut pozisyondan sonrasını sil, yeni state ekle
  undoStack = undoStack.slice(0, undoIndex + 1);
  undoStack.push(editor.value);
  if (undoStack.length > 100) undoStack.shift();
  undoIndex = undoStack.length - 1;
}

window.renderPreview = function() {
  const text = editor.value.trim();
  if (!text) {
    preview.innerHTML = '<span style="color:var(--text2);font-size:12px">önizleme burada görünür...</span>';
    return;
  }
  preview.innerHTML = '<span style="color:var(--text2);font-size:12px">yükleniyor...</span>';
  const form = new FormData();
  form.append('content', text);
  fetch(PREVIEW_URL, { method: 'POST', body: form })
    .then(r => r.json())
    .then(data => { preview.innerHTML = data.html; })
    .catch(() => { preview.innerHTML = '<span style="color:#f87171;font-size:12px">hata oluştu</span>'; });
}

// Toolbar — tarayıcı undo history'sini koruyarak insert
function execInsert(newVal, newStart, newEnd) {
  // execCommand deprecated ama undo history'yi koruyan tek yol
  editor.focus();
  editor.setSelectionRange(0, editor.value.length);
  document.execCommand('insertText', false, newVal);
  editor.setSelectionRange(newStart, newEnd);
  saveUndo();
}

window.insertMd = function(before, after) {
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'metin';
  const full = editor.value.substring(0, s) + before + sel + after + editor.value.substring(e);
  editor.value = full;
  editor.setSelectionRange(s + before.length, s + before.length + sel.length);
  editor.focus();
  saveUndo();
}

window.insertBlock = function(before, after) {
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'kod buraya';
  const full = editor.value.substring(0, s) + before + sel + after + editor.value.substring(e);
  editor.value = full;
  editor.setSelectionRange(s + before.length, s + before.length + sel.length);
  editor.focus();
  saveUndo();
}

window.insertLine = function(prefix) {
  const s = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
  const full = editor.value.substring(0, lineStart) + prefix + editor.value.substring(lineStart);
  editor.value = full;
  editor.setSelectionRange(s + prefix.length, s + prefix.length);
  editor.focus();
  saveUndo();
}

// Tab — 2 boşluk
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart;
    this.value = this.value.substring(0, s) + '  ' + this.value.substring(s);
    this.setSelectionRange(s + 2, s + 2);
    saveUndo();
  }
  // Ctrl+Z
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    if (undoIndex > 0) {
      undoIndex--;
      editor.value = undoStack[undoIndex];
    }
  }
  // Ctrl+Y / Ctrl+Shift+Z — redo
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) {
    e.preventDefault();
    if (undoIndex < undoStack.length - 1) {
      undoIndex++;
      editor.value = undoStack[undoIndex];
    }
  }
});

// Normal yazarken de undo stack'e kaydet (500ms debounce)
let saveTimer = null;
editor.addEventListener('input', function() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveUndo, 500);
});

// Sayfa yüklenince mevcut içeriği render et
if (editor.value.trim()) renderPreview();
</script>
{% endblock %}
