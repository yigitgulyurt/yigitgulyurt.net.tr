{% extends "admin/base.html" %}
{% block title %}{{ 'Düzenle' if post.id else 'Yeni Yazı' }}{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Yazıyı Düzenle' if post.id else 'Yeni Yazı' }}</h1>

<form method="POST" style="margin-top:24px">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="form-group" style="margin-bottom:0">
      <label>// başlık *</label>
      <input type="text" name="title" value="{{ post.title or '' }}" required>
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>// slug (boş bırakılırsa otomatik)</label>
      <input type="text" name="slug" value="{{ post.slug or '' }}">
    </div>
  </div>

  <div class="form-group">
    <label>// özet</label>
    <input type="text" name="summary" value="{{ post.summary or '' }}">
  </div>

  <div class="form-group">
    <div class="editor-toolbar">
      <span style="font-size:11px;color:var(--accent)">// içerik (Markdown)</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button type="button" class="editor-btn" onclick="insertMd('**','**')" title="Kalın"><strong>B</strong></button>
        <button type="button" class="editor-btn" onclick="insertMd('*','*')" title="İtalik"><em>I</em></button>
        <button type="button" class="editor-btn" onclick="insertMd('\`','\`')" title="Kod">&#96;</button>
        <button type="button" class="editor-btn" onclick="insertBlock('\`\`\`\n','\n\`\`\`')" title="Kod bloğu">{ }</button>
        <button type="button" class="editor-btn" onclick="insertLine('## ')" title="Başlık">H2</button>
        <button type="button" class="editor-btn" onclick="insertLine('- ')" title="Liste">—</button>
        <button type="button" class="editor-btn" onclick="insertMd('[','](https://)')" title="Link">↗</button>
      </div>
    </div>
    <div class="editor-split">
      <textarea
        name="content"
        id="md-editor"
        class="editor-textarea"
        placeholder="Markdown yaz...">{{ post.content or '' }}</textarea>
      <div id="md-preview" class="editor-preview blog-content">
        <span style="color:var(--text2);font-size:12px">önizleme burada görünür...</span>
      </div>
    </div>
  </div>

  <div class="form-group" style="display:flex;align-items:center;gap:10px">
    <input type="checkbox" name="published" id="published" {{ 'checked' if post.published }} style="width:auto">
    <label for="published" style="color:var(--text2);margin-bottom:0">yayınla</label>
  </div>

  <div style="display:flex;gap:10px;margin-top:8px">
    <button type="submit" class="btn btn-primary">→ kaydet</button>
    <a class="btn" href="{{ url_for('admin.blog') }}">iptal</a>
  </div>

</form>
{% endblock %}

{% block scripts %}
<script>
const editor  = document.getElementById('md-editor');
const preview = document.getElementById('md-preview');
const PREVIEW_URL = '{{ url_for("admin.preview") }}';
let previewTimer = null;

function renderPreview() {
  const content = editor.value.trim();
  if (!content) {
    preview.innerHTML = '<span style="color:var(--text2);font-size:12px">önizleme burada görünür...</span>';
    return;
  }
  const form = new FormData();
  form.append('content', content);
  fetch(PREVIEW_URL, { method: 'POST', body: form })
    .then(r => r.json())
    .then(data => { preview.innerHTML = data.html; })
    .catch(() => {});
}

editor.addEventListener('input', function() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(renderPreview, 300);
});

// Toolbar — inline sarma
function insertMd(before, after) {
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'metin';
  editor.setRangeText(before + sel + after, s, e, 'end');
  editor.focus();
  renderPreview();
}

// Blok sarma (kod bloğu gibi)
function insertBlock(before, after) {
  const s = editor.selectionStart;
  const e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'kod buraya';
  editor.setRangeText(before + sel + after, s, e, 'end');
  editor.focus();
  renderPreview();
}

// Satır başına ekle
function insertLine(prefix) {
  const s = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
  editor.setRangeText(prefix, lineStart, lineStart, 'end');
  editor.focus();
  renderPreview();
}

// Tab — 2 boşluk
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart;
    this.setRangeText('  ', s, s, 'end');
    clearTimeout(previewTimer);
    previewTimer = setTimeout(renderPreview, 300);
  }
});

// Sayfa yüklenince mevcut içeriği render et
renderPreview();
</script>
{% endblock %}
