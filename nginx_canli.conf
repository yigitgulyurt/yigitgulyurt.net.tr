server {
    listen 80;
    server_name canli.yigitgulyurt.net.tr;
    # Certbot sonrası otomatik doldurulur

    # HLS kaynağı — aynı MediaMTX'e proxy
    location /canli-kaynak/ {
        proxy_pass http://127.0.0.1:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # stream API + sayfa — yigitgulyurt Flask app'ine
    location /stream/ {
        include proxy_params;
        proxy_pass http://unix:/var/www/yigitgulyurt/yigitgulyurt.sock;
    }

    location /static/ {
        alias /var/www/yigitgulyurt/app/static/;
        expires 30d;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/yigitgulyurt/yigitgulyurt.sock;
    }
}
