# xn--canl-oza.yigitgulyurt.net.tr (canlı'nın punycode karşılığı)
# → canli.yigitgulyurt.net.tr 301
# Not: DNS'te xn--canl-oza.yigitgulyurt.net.tr A kaydı da eklenmeli
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name xn--canl-oza.yigitgulyurt.net.tr;

    ssl_certificate /etc/letsencrypt/live/yigitgulyurt.net.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yigitgulyurt.net.tr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://canli.yigitgulyurt.net.tr$request_uri;
}
